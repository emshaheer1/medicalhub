<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Medical Training Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <button class="mobile-toggle" id="sidebarToggle" aria-label="Toggle menu">
    <i data-lucide="menu" class="lucide-icon"></i>
  </button>

  <div class="dashboard-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <img src="/assets/logo.png" alt="Medical Training Hub" />
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="overview">
          <span class="nav-icon"><i data-lucide="layout-dashboard" class="lucide-icon"></i></span> Overview
        </button>
        <button class="nav-item" data-view="registrations">
          <span class="nav-icon"><i data-lucide="clipboard-list" class="lucide-icon"></i></span> Course Registrations
        </button>
        <button class="nav-item" data-view="agreements">
          <span class="nav-icon"><i data-lucide="file-signature" class="lucide-icon"></i></span> Phlebotomy Agreements
        </button>
      </nav>
      <div class="sidebar-footer">
        <div class="admin-name" id="adminName">
          <i data-lucide="user-circle" class="lucide-icon"></i>
          <span>Admin</span>
        </div>
        <button class="btn btn-outline btn-sm" id="logoutBtn" style="width:100%;color:#fff;border-color:rgba(255,255,255,0.3)">
          <i data-lucide="log-out" class="lucide-icon"></i> Logout
        </button>
      </div>
    </aside>

    <div class="content-area">
      <header class="top-bar">
        <div class="top-bar-left">
          <h1 class="top-bar-title" id="topBarTitle">Dashboard</h1>
        </div>
        <div class="top-bar-right">
          <button class="btn btn-primary btn-sm btn-icon" id="downloadAllPdfBtn">
            <i data-lucide="download" class="lucide-icon"></i> Download PDF
          </button>
          <button class="btn btn-outline btn-sm btn-icon" id="topRefreshBtn">
            <i data-lucide="refresh-cw" class="lucide-icon"></i> Refresh
          </button>
          <div class="notification-wrap">
            <button class="notification-bell" id="notificationBell" aria-label="Notifications" onclick="toggleNotificationPanel()">
              <i data-lucide="bell" class="lucide-icon"></i>
              <span class="notification-badge" id="notificationBadge" hidden>0</span>
            </button>
            <div class="notification-dropdown" id="notificationDropdown">
              <div class="notification-dropdown-header">
                <strong>Notifications</strong>
                <button class="link-btn" onclick="markAllNotificationsRead()">Mark all read</button>
              </div>
              <div class="notification-list" id="notificationList"></div>
            </div>
          </div>
        </div>
      </header>
      <main class="main-content" id="mainContent"></main>
    </div>
  </div>

  <div class="notification-toast" id="notificationToast"></div>

  <div class="modal-overlay" id="detailModal">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h3 id="modalTitle">Entry Details</h3>
        <button class="modal-close" id="modalClose" aria-label="Close">
          <i data-lucide="x" class="lucide-icon"></i>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-primary btn-sm btn-icon" id="modalPdfBtn">
          <i data-lucide="download" class="lucide-icon"></i> Download PDF
        </button>
        <button class="btn btn-outline btn-sm" id="modalCloseBtn">Close</button>
        <button class="btn btn-danger btn-sm" id="modalDeleteBtn">
          <i data-lucide="trash-2" class="lucide-icon"></i> Delete Entry
        </button>
      </div>
    </div>
  </div>

  <script src="/js/fieldConfig.js"></script>
  <script src="/js/pdfExport.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
